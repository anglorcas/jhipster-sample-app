name: Application CI

on: [push, pull_request]

jobs:
  pipeline:
    name: jhipsterSampleApplication pipeline
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]') && !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.pull_request.title, '[skip ci]') && !contains(github.event.pull_request.title, '[ci skip]')"
    timeout-minutes: 40

    env:
      NODE_VERSION: 20.15.0
      SPRING_OUTPUT_ANSI_ENABLED: DETECT
      SPRING_JPA_SHOW_SQL: false
      JHI_DISABLE_WEBPACK_LOGS: true
      NG_CLI_ANALYTICS: false
      GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      PUSHGATEWAY_URL: https://profound-abnormally-monkfish.ngrok-free.app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.15.0
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Install node.js packages
        run: npm install

      # Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run backend test
        id: backend_test
        run: |
          chmod +x mvnw
          npm run ci:backend:test
        continue-on-error: true

      - name: Run frontend test
        id: frontend_test
        run: npm run ci:frontend:test
        continue-on-error: true

      - name: Upload Backend Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml
          flags: backend

      - name: Upload Frontend Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            target/test-results/lcov.info
            target/test-results/coverage-final.json
          flags: frontend

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            target/site/jacoco/jacoco.xml
            target/test-results/lcov.info

      - name: Collect Test Metrics
        run: |
          BACKEND_TESTS_FAILED=${{ steps.backend_test.outcome == 'failure' && 1 || 0 }}
          FRONTEND_TESTS_FAILED=${{ steps.frontend_test.outcome == 'failure' && 1 || 0 }}

          TOTAL_TESTS=481
          TOTAL_FAILED=$((BACKEND_TESTS_FAILED + FRONTEND_TESTS_FAILED))
          TOTAL_SUCCEEDED=$((TOTAL_TESTS - TOTAL_FAILED))

          echo "tests_failed $TOTAL_FAILED" > metrics.prom
          echo "tests_succeeded $TOTAL_SUCCEEDED" >> metrics.prom

      - name: Push Test Metrics to Prometheus Pushgateway
        run: |
          echo "Pushing metrics to Pushgateway..."
          cat metrics.prom

          curl -v ${PUSHGATEWAY_URL}
          curl -v --data-binary @metrics.prom ${PUSHGATEWAY_URL}/metrics/job/github_actions

          echo "chapter_35_metric $(date +%s)" | curl -v --data-binary @- ${PUSHGATEWAY_URL}/metrics/job/chapter35

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=anglorcas_jhipster-sample-app
            -Dsonar.organization=anglorcas-org-66
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.java.binaries=target/classes
            -Dsonar.java.test.binaries=target/test-classes

      - name: Package application
        run: npm run java:jar:prod

      - name: 'E2E: Package'
        run: npm run ci:e2e:package

      - name: 'E2E: Prepare'
        run: npm run ci:e2e:prepare

      - name: 'E2E: Run (Cypress)'
        run: npm run ci:e2e:run

      - name: 'E2E: Run (Playwright)'
        run: |
          # Start the app in the background and save its PID
          npm run start:prod &
          APP_PID=$!

          # Wait for localhost:8080 to be ready
          npx wait-on http://localhost:8080

          # Run Playwright tests
          npx playwright test --config=src/test/javascript/playwright/playwright.config.ts

          # Kill the app process after tests
          kill $APP_PID || true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/test/javascript/playwright/playwright-report

      - name: 'E2E: Teardown'
        run: npm run ci:e2e:teardown
